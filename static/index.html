    padding-bottom: 0.8rem;

  .title { font-weight: 600; }

  .urls { font-size: 0.85rem; word-break: break-all; }
  .urls div { margin: 0.15rem 0; }
  .label {
    display: inline-block;
    min-width: 70px;

  .pending { color: #c08a00; }
  .error { color: #c0392b; }
  .ok a { color: #2e7d32; }

  .row-actions button {
    font-size: 0.8rem;
    padding: 0.25rem 0.6rem;

    display: flex;
    gap: 0;
    border-bottom: 2px solid #33333322;
    margin-bottom: 0.8rem;
  }
  .tab-bar button {
    padding: 0.5rem 1rem;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    background: transparent;
    color: #888;
    cursor: pointer;

    color: #4a8cf0;
    border-bottom-color: #4a8cf0;
    font-weight: 600;

  .tab-panel.active { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    padding: 0.35rem 0.7rem;
    font-size: 0.82rem;
    border: 1px solid #33333344;
    border-radius: 4px;

<body>
<h1>Google News RSS Resolver</h1>
<div class="sub">검색어로 Google News RSS를 받아온 뒤, Playwright로 실제 기사 URL을 해석합니다.</div>

<div class="samples">
  <div class="tab-bar" id="tab-bar">
    <button data-tab="domestic" class="active">국내</button>
    <button data-tab="global">해외</button>
    <button data-tab="trends">트렌드</button>
  </div>
  <div id="panel-domestic" class="tab-panel active"></div>
  <div id="panel-global" class="tab-panel"></div>
  <div id="panel-trends" class="tab-panel"></div>

<form id="search-form">
  <input type="text" id="query" placeholder="검색어 (예: OpenAI)" />
  <button type="submit">피드 가져오기</button>
</form>

<div class="toolbar" id="toolbar" style="display:none;">
  <span class="count" id="count"></span>
  <span class="count" id="progress"></span>
  <span class="count" id="stats"></span>
  <span class="count" id="elapsed"></span>
  <button id="resolve-all">해석 시작</button>
  <button class="secondary" id="stop" style="border-color:#c0392b;color:#c0392b;display:none;">중단</button>
</div>

<ol id="results"></ol>

<hr style="margin:2rem 0;opacity:0.2;" />

<h2 style="font-size:1.1rem;">디버그: 특정 URL 테스트</h2>
<div class="sub" style="font-size:0.85rem;">하드코딩된 문제 URL 목록을 순차적으로 해석합니다.</div>

const queryInput = document.getElementById("query");
const tabBar = document.getElementById("tab-bar");

function renderSamples() {
  for (const [key, list] of Object.entries(SAMPLES)) {
    const panel = document.getElementById(`panel-${key}`);
    list.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "sample-btn";
      btn.textContent = s.label;
      btn.addEventListener("click", () => { queryInput.value = s.q; });
      panel.appendChild(btn);
    });
  }
}
renderSamples();

tabBar.addEventListener("click", (e) => {
  const tab = e.target.dataset?.tab;
  if (!tab) return;
  tabBar.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === `panel-${tab}`));
});

const form = document.getElementById("search-form");
const resultsEl = document.getElementById("results");
const toolbar = document.getElementById("toolbar");
const countEl = document.getElementById("count");
const resolveAllBtn = document.getElementById("resolve-all");
const stopBtn = document.getElementById("stop");
const statsEl = document.getElementById("stats");
const progressEl = document.getElementById("progress");
const elapsedEl = document.getElementById("elapsed");
let elapsedTimer = null;
let elapsedStart = 0;

function fmtDuration(ms) {
  const s = ms / 1000;
  if (s < 60) return `${s.toFixed(1)}초`;
  const m = Math.floor(s / 60);
  const rem = (s - m * 60).toFixed(1);
  return `${m}분 ${rem}초`;
}

let items = [];
let stats = { done: 0, ok: 0, total: 0 };
let abortCtrl = null;

function updateStats() {
  if (stats.total === 0) {
    statsEl.textContent = "";
    progressEl.textContent = "";
    return;
  }
  const progPct = ((stats.done / stats.total) * 100).toFixed(1);
  progressEl.textContent = `진행률 ${progPct}% (${stats.done}/${stats.total})`;
  const okPct = stats.done ? ((stats.ok / stats.done) * 100).toFixed(1) : "0.0";
  statsEl.textContent = `성공률 ${okPct}% (${stats.ok}/${stats.done})`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = document.getElementById("query").value.trim();
  if (!q) return;
  if (abortCtrl) abortCtrl.abort();
  resolveAllBtn.disabled = false;
  resolveAllBtn.textContent = "해석 시작";
  stopBtn.style.display = "none";
  resultsEl.innerHTML = "<li>불러오는 중...</li>";
  toolbar.style.display = "none";
  try {
    const r = await fetch(`/api/feed?q=${encodeURIComponent(q)}`);
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    items = data.items;
    stats = { done: 0, ok: 0, total: items.length };
    updateStats();
    render();
    toolbar.style.display = "flex";
    countEl.textContent = `${items.length}개 항목`;
  } catch (err) {
    resultsEl.innerHTML = `<li class="error">오류: ${err.message}</li>`;
  }
});

function render() {
  resultsEl.innerHTML = "";
  items.forEach((it, idx) => {
    const li = document.createElement("li");
    li.innerHTML = `
      <div class="title">${escapeHtml(it.title)}</div>
      <div class="meta">${escapeHtml(it.source || "")} · ${escapeHtml(it.pubDate)}</div>
      <div class="urls">
        <div><span class="label">google:</span> <a href="${it.link}" target="_blank" rel="noreferrer">${escapeHtml(it.link)}</a></div>
        <div id="final-${idx}"><span class="label">실제:</span> <span class="pending">아직 해석 안 됨</span></div>
      </div>
      <div class="row-actions">
        <button data-idx="${idx}" class="resolve-one">이 항목 해석</button>
      </div>
    `;
    resultsEl.appendChild(li);
  });
  resultsEl.querySelectorAll(".resolve-one").forEach(btn => {
    btn.addEventListener("click", () => resolveOne(parseInt(btn.dataset.idx)));
  });
}

async function resolveOne(idx, signal) {
  const cell = document.getElementById(`final-${idx}`);
  if (signal && signal.aborted) {
    cell.innerHTML = `<span class="label">실제:</span> <span class="error">중단됨</span>`;
    stats.done += 1;
    updateStats();
    return;
  }
  cell.innerHTML = `<span class="label">실제:</span> <span class="pending">해석 중...</span>`;
  let success = false;
  try {
    const r = await fetch(`/api/resolve?url=${encodeURIComponent(items[idx].link)}&title=${encodeURIComponent(items[idx].title)}`, { signal });
    const data = await r.json();
    if (data.final_url) {
      const fb = data.fallback ? ` <span class="pending">(유사기사 대체 ${(data.similarity * 100).toFixed(0)}% · ${data.method})</span>` : '';
      cell.innerHTML = `<span class="label">실제:</span> <span class="ok"><a href="${data.final_url}" target="_blank" rel="noreferrer">${escapeHtml(data.final_url)}</a></span>${fb}`;
      success = true;
    } else {
      const reason = data.fallback_attempted
        ? ` <span class="meta">(유사대체기사 없음, 최고 유사도 ${(data.similarity * 100).toFixed(0)}% · ${data.method})</span>`
        : '';
      cell.innerHTML = `<span class="label">실제:</span> <span class="error">해석 실패</span>${reason}`;
    }
  } catch (err) {
    if (err.name === "AbortError") {
      cell.innerHTML = `<span class="label">실제:</span> <span class="error">중단됨</span>`;
    } else {
      cell.innerHTML = `<span class="label">실제:</span> <span class="error">오류: ${escapeHtml(err.message)}</span>`;
    }
  }
  stats.done += 1;
  if (success) stats.ok += 1;
  updateStats();
}

resolveAllBtn.addEventListener("click", async () => {
  if (items.length === 0) return;
  stats = { done: 0, ok: 0, total: items.length };
  updateStats();
  resolveAllBtn.disabled = true;
  resolveAllBtn.textContent = "해석 중...";
  stopBtn.style.display = "inline-block";
  abortCtrl = new AbortController();
  elapsedStart = Date.now();
  elapsedEl.textContent = `경과 0.0초`;
  elapsedTimer = setInterval(() => {
    elapsedEl.textContent = `경과 ${fmtDuration(Date.now() - elapsedStart)}`;
  }, 100);
  const tasks = items.map((_, idx) => resolveOne(idx, abortCtrl.signal));
  await Promise.all(tasks);
  clearInterval(elapsedTimer);
  elapsedTimer = null;
  const total = Date.now() - elapsedStart;
  elapsedEl.textContent = `총 ${fmtDuration(total)}`;
  resolveAllBtn.disabled = false;
  resolveAllBtn.textContent = "해석 시작";
  stopBtn.style.display = "none";
  abortCtrl = null;
});

stopBtn.addEventListener("click", () => {

});

      <div class="title">${escapeHtml(item.title)}</div>
      <div class="urls">
        <div><span class="label">google:</span> <a href="${item.url}" target="_blank" rel="noreferrer">${escapeHtml(item.url.slice(0, 100))}${item.url.length > 100 ? "..." : ""}</a></div>
        <div id="debug-final-${i}"><span class="label">실제:</span> <span class="pending">대기 중</span></div>
        <div class="meta">길이: ${item.url.length}자</div>
      </div>
    `;
    debugResultsEl.appendChild(li);
  });
  for (let i = 0; i < DEBUG_ITEMS.length; i++) {
    const item = DEBUG_ITEMS[i];
    const cell = document.getElementById(`debug-final-${i}`);
    cell.innerHTML = `<span class="label">실제:</span> <span class="pending">해석 중...</span>`;
    const start = Date.now();
    try {
      const r = await fetch(`/api/resolve?url=${encodeURIComponent(item.url)}&title=${encodeURIComponent(item.title)}`);
      const data = await r.json();
      const elapsed = ((Date.now() - start) / 1000).toFixed(1);
      if (data.final_url) {
        const fb = data.fallback ? ` <span class="pending">(유사기사 대체 ${(data.similarity * 100).toFixed(0)}% · ${data.method})</span>` : '';
        cell.innerHTML = `<span class="label">실제:</span> <span class="ok"><a href="${data.final_url}" target="_blank" rel="noreferrer">${escapeHtml(data.final_url)}</a></span>${fb} <span class="meta">(${elapsed}s)</span>`;
      } else {
        const reason = data.fallback_attempted
          ? ` <span class="meta">(유사대체기사 없음, 최고 유사도 ${(data.similarity * 100).toFixed(0)}% · ${data.method})</span>`
          : '';
        cell.innerHTML = `<span class="label">실제:</span> <span class="error">해석 실패</span>${reason} <span class="meta">(${elapsed}s)</span>`;
      }
    } catch (err) {
      cell.innerHTML = `<span class="label">실제:</span> <span class="error">오류: ${escapeHtml(err.message)}</span>`;
    }
  }
  debugBtn.disabled = false;
  debugBtn.textContent = "디버그 URL 해석";
});

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
</script>
</body>
</html>
